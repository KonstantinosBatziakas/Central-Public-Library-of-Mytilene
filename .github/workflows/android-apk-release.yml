name: Android APK Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android-app
        run: gradle :app:assembleDebug

      - name: Prepare stable APK filename
        run: |
          cp android-app/app/build/outputs/apk/debug/app-debug.apk central-library-android.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: central-library-android
          path: central-library-android.apk

      - name: Upload APK to current release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: central-library-android.apk
